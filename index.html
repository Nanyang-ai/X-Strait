let activeM=MONTHS[MONTHS.length-1];
let tlChart=null;
let activeFilter='overall';

function sc(s){return s==='Low'?'s-low':s==='Moderate'?'s-mod':'s-high';}
function otcol(t){const m={'-3':'#8B1A1A','-2':'#C0392B','-1':'#E8847A','0':'#888780','1':'#7ECDC0','2':'#2AB5A5','3':'#1A7A6E'};return m[String(t)]||'#888780';}
function tl(t){const m={'-3':'−3 Sig. deteriorating','-2':'−2 Deteriorating','-1':'−1 Disruptive','0':'No change','+1':'+1 Stabilizing','+2':'+2 Improving','+3':'+3 Sig. improving'};return m[t>=0?'+'+t:''+t]||t;}
function tc(t){return t<0?'tn':t>0?'tp':'tf';}
function ta(t){return t<=-2?'↓↓':t===-1?'↓':t===0?'→':t===1?'↑':'↑↑';}
function sig(s){return s==='e'?'<span class="sig-e">elevated</span>':s==='w'?'<span class="sig-w">watch</span>':'<span class="sig-b">baseline</span>';}

function renderTabs(){
  document.getElementById('month-tabs').innerHTML=MONTHS.map(m=>
    `<button class="mtab${m===activeM?' active':''}" onclick="setM('${m}')">${m}</button>`
  ).join('');
}

function renderTable(){
  const d=DATA[activeM];
  document.getElementById('active-label').textContent=activeM;
  document.getElementById('ind-tbody').innerHTML=INDS.map(ind=>{
    const v=d[ind.id];
    return `<tr class="row" onclick="openModal('${activeM}','${ind.id}')">
      <td style="font-weight:500">${ind.name}</td>
      <td><span class="badge ${sc(v.status)}">${v.status}</span></td>
      <td><span class="tc ${tc(v.trend)}">${ta(v.trend)} ${tl(v.trend)}</span></td>
      <td style="color:#5f5e5a;font-size:13px;line-height:1.5">${v.summary}</td>
    </tr>`;
  }).join('');
}

function renderWatchpoints(){
  document.getElementById('watchpoints').innerHTML=WATCHPOINTS.map(w=>
    `<div class="bi"><div class="bd"></div><div>${w}</div></div>`
  ).join('');
}

function renderFilters(){
  const filters=[{id:'overall',label:'Overall'},...INDS.map(i=>({id:i.id,label:i.short}))];
  document.getElementById('chart-filters').innerHTML=filters.map(f=>
    `<button class="ftab${f.id===activeFilter?' active':''}" onclick="setFilter('${f.id}')">${f.label}</button>`
  ).join('');
}

function setFilter(id){
  activeFilter=id;
  renderFilters();
  renderTimeline();
}

function getChartData(){
  if(activeFilter==='overall'){
    return {
      data:OVERALL.map(o=>o.t),
      colors:OVERALL.map(o=>otcol(o.t)),
      tooltips:MONTHS.map((m,i)=>({
        title:`${m} — Overall`,
        trend:OVERALL[i].label,
        summary:null
      }))
    };
  }
  const ind=INDS.find(i=>i.id===activeFilter);
  return {
    data:MONTHS.map(m=>DATA[m][activeFilter].trend),
    colors:MONTHS.map(m=>otcol(DATA[m][activeFilter].trend)),
    tooltips:MONTHS.map(m=>({
      title:`${m} — ${ind.name}`,
      trend:tl(DATA[m][activeFilter].trend),
      summary:DATA[m][activeFilter].summary
    }))
  };
}

function renderTimeline(){
  if(tlChart)tlChart.destroy();
  const cd=getChartData();
  tlChart=new Chart(document.getElementById('tlChart'),{
    type:'line',
    data:{
      labels:MONTHS,
      datasets:[{
        label:'Trend',
        data:cd.data,
        borderColor:'rgba(100,100,95,0.25)',
        borderWidth:2,tension:0.3,fill:false,
        pointRadius:7,pointHoverRadius:10,
        pointBackgroundColor:cd.colors,
        pointBorderColor:cd.colors.map(c=>c+'33'),
        pointBorderWidth:3,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{
        x:{
          grid:{color:'rgba(0,0,0,0.06)'},
          ticks:{color:'#888780',font:{size:12}},
          border:{color:'rgba(0,0,0,0.06)'}
        },
        y:{
          min:-3,max:3,
          grid:{color:'rgba(0,0,0,0.06)'},
          ticks:{color:'#888780',font:{size:11},stepSize:1,
            callback:v=>{
              const m={'-3':'−3 Sig. deteriorating','-2':'−2 Deteriorating','-1':'−1 Disruptive','0':'No change','1':'+1 Stabilizing','2':'+2 Improving','3':'+3 Sig. improving'};
              return m[String(v)]||'';
            }
          },
          border:{color:'rgba(0,0,0,0.06)'}
        }
      },
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title:i=>cd.tooltips[i[0].dataIndex].title,
            label:i=>{
              const tt=cd.tooltips[i.dataIndex];
              const lines=[tt.trend];
              if(tt.summary){
                const words=tt.summary.split(' ');
                let line='';
                words.forEach(w=>{
                  if((line+' '+w).length>60){lines.push(line.trim());line=w;}
                  else{line+=(line?' ':'')+w;}
                });
                if(line)lines.push(line.trim());
              }
              lines.push('');
        
              return lines;
            }
          },
          backgroundColor:'#fff',
          titleColor:'#1a1a18',
          bodyColor:'#5f5e5a',
          borderColor:'rgba(0,0,0,0.1)',
          borderWidth:1,
          padding:12,
          boxPadding:4,
        }
      },

    }
  });
}

function openMonthModal(month){
  const d=DATA[month];
  const ov=OVERALL[MONTHS.indexOf(month)];
  document.getElementById('modal-title').textContent=`Full breakdown — ${month}`;
  document.getElementById('modal-meta').innerHTML=`Overall trend: <strong style="color:${otcol(ov.t)}">${ov.label}</strong> &nbsp;<span style="font-size:11px;color:#aaa">(provisional)</span>`;
  document.getElementById('modal-body').innerHTML=INDS.map(ind=>{
    const v=d[ind.id];
    return `<div class="srow">
      <div class="srow-name">${ind.name} &nbsp;<span class="badge ${sc(v.status)}">${v.status}</span>&nbsp;<span class="${tc(v.trend)}" style="font-size:12px;font-weight:500">${ta(v.trend)} ${tl(v.trend)}</span></div>
      <div class="srow-obs">${v.summary}</div>
    </div>`;
  }).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function openModal(month,indId){
  const ind=INDS.find(i=>i.id===indId);
  const v=DATA[month][indId];
  document.getElementById('modal-title').textContent=ind.name;
  document.getElementById('modal-meta').innerHTML=
    `${month} &nbsp;·&nbsp; <span class="badge ${sc(v.status)}">${v.status}</span> &nbsp;·&nbsp; <span class="${tc(v.trend)}">${ta(v.trend)} ${tl(v.trend)}</span> <span class="conf-pill">confidence: ${v.conf}</span>`;
  document.getElementById('modal-body').innerHTML=`
    <div class="fn"><strong>Scoring note:</strong> Status = severity of sub-indicator signals. Trend = deviation from established baseline, not absolute level. Impact and reported effects weighted over tactics and infrastructure alone.</div>
    <div class="mo-summary">${v.summary}</div>
    <div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#888780;margin-bottom:.5rem">Sub-indicator breakdown</div>
    ${v.subs.map(s=>`<div class="srow">
      <div class="srow-name">${s.name}</div>
      <div class="srow-obs">${s.obs}</div>
      <div class="srow-src">Sources: ${s.src}</div>
    </div>`).join('')}
    <div class="src-block"><strong>Primary sources:</strong> ISW-AEI China &amp; Taiwan Update (Jan–Apr 2026) · Taiwan NSB Cognitive Warfare Report · Gemini cross-validated data · Focus Taiwan / CNA · Taipei Times · The Diplomat · Global Taiwan Institute · Foreign Policy · Washington Times · The Hill</div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

function setM(m){
  activeM=m;
  renderTabs();
  renderTable();
